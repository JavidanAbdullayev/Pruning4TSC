# Fine-tune a pruned LITE checkpoint.
# Reference: finetune_with_lr_scheduler.py.

name: finetune_lite
model: lite  # inferred from checkpoint, kept for documentation

# Load a pruned model produced by the offline pruning step.
# {dataset} and {seed} are substituted at runtime.
init_from: "results/base_lite_sparsity/seed_{seed}/{dataset}/pruned_model.pth"
reinit_weights: false  # finetune: keep the pruned weights

epochs: 500
use_scheduler: true
scheduler_patience: 50
scheduler_factor: 0.5
min_lr: 1.0e-4

sparse_lambda: 0.0  # disable sparsity during fine-tuning

seeds: [9409, 3804, 3952, 2561, 5296]
