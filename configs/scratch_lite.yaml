# Train a pruned LITE architecture from scratch (lottery-ticket-style).
# Reference: scratch_training*.py.

name: scratch_lite
model: lite

init_from: "results/base_lite_sparsity/seed_{seed}/{dataset}/pruned_model.pth"
reinit_weights: true  # reset the pruned model's weights

epochs: 1500
use_scheduler: true
scheduler_patience: 50
scheduler_factor: 0.5
min_lr: 1.0e-4

sparse_lambda: 0.0

seeds: [9409, 3804, 3952, 2561, 5296]
